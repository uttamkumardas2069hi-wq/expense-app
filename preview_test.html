<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Sign Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background:#111; color:#eee; margin:0; padding:16px; }
  h1 { font-size:20px; margin-bottom:4px; }
  .card { background:#1c1c1c; border-radius:12px; padding:16px; margin-bottom:16px; }
  textarea, select, input[type=text] { width:100%; box-sizing:border-box; padding:10px; border-radius:8px;
    border:1px solid #444; background:#222; color:#fff; font-size:16px; margin-top:6px; }
  label { font-size:13px; color:#aaa; }
  button { background:#3a7afe; color:#fff; border:none; padding:10px 16px; border-radius:8px;
    font-size:15px; margin:6px 6px 0 0; cursor:pointer; }
  button.secondary { background:#333; }
  button.danger { background:#a83232; }
  canvas#preview { width:100%; background:#000; border-radius:8px; margin-top:10px; image-rendering:pixelated; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:140px; }
  #msgList div.item { display:flex; justify-content:space-between; align-items:center;
    background:#222; padding:8px 10px; border-radius:8px; margin-top:6px; }
  #status { font-size:13px; color:#8f8; min-height:18px; }
</style>
</head>
<body>
  <h1>Multilingual LED Sign</h1>
  <div id="status">Ready.</div>

  <div class="card">
    <label>Message (type in English)</label>
    <textarea id="englishText" rows="2" placeholder="e.g. Happy Diwali, welcome to our store!"></textarea>

    <div class="row">
      <div>
        <label>Display language</label>
        <select id="targetLang">
          <option value="en">English (no translation)</option>
          <option value="hi">Hindi</option>
          <option value="mr">Marathi</option>
        </select>
      </div>
      <div>
        <label>Text color</label>
        <input type="color" id="textColor" value="#ff2020" style="width:100%; height:42px; margin-top:6px;">
      </div>
    </div>

    <button onclick="translateAndPreview()">Translate + Preview</button>
    <button class="secondary" onclick="previewOnly()">Preview (no translate)</button>

    <canvas id="preview" height="15"></canvas>

    <div class="row" style="margin-top:10px;">
      <div>
        <label>Scroll speed (ms/column, lower = faster)</label>
        <input type="text" id="speed" value="60">
      </div>
      <div>
        <label>Loops before switching to next message</label>
        <input type="text" id="loops" value="1">
      </div>
    </div>

    <button onclick="uploadMessage()">Send to Display</button>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Playback controls</h3>
    <button onclick="ctrl('prev')">Prev</button>
    <button onclick="ctrl('next')">Next</button>
    <button class="secondary" onclick="ctrl('testPattern')">Calibrate wiring</button>
    <div class="row" style="margin-top:10px;">
      <div>
        <label>Global brightness (0-255)</label>
        <input type="text" id="brightness" value="80">
        <button class="secondary" onclick="setBrightness()">Set</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Saved messages</h3>
    <div id="msgList">Loading...</div>
  </div>

<script>
const HEIGHT = 15;
let lastBitmap = null;   // {width, bytes: Uint8Array}

function setStatus(t) { document.getElementById('status').innerText = t; }

async function translateAndPreview() {
  const text = document.getElementById('englishText').value.trim();
  const lang = document.getElementById('targetLang').value;
  if (!text) { setStatus('Type a message first.'); return; }

  let finalText = text;
  if (lang !== 'en') {
    setStatus('Translating...');
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${lang}`;
      const resp = await fetch(url);
      const data = await resp.json();
      finalText = data.responseData.translatedText || text;
    } catch (e) {
      setStatus('Translation failed, showing English instead.');
      finalText = text;
    }
  }
  renderToCanvas(finalText, lang);
}

function previewOnly() {
  const text = document.getElementById('englishText').value.trim();
  if (!text) { setStatus('Type a message first.'); return; }
  renderToCanvas(text, 'en');
}

function renderToCanvas(text, lang) {
  const color = document.getElementById('textColor').value;
  const fontFamily = (lang === 'hi' || lang === 'mr') ? "'Noto Sans Devanagari'" : "'Inter'";

  const bigHeight = 120;
  const bigCanvas = document.createElement('canvas');
  const bctx = bigCanvas.getContext('2d');
  bctx.font = `700 ${bigHeight * 0.8}px ${fontFamily}`;
  const textWidth = Math.ceil(bctx.measureText(text).width) + 20;

  bigCanvas.width = textWidth;
  bigCanvas.height = bigHeight;
  bctx.font = `700 ${bigHeight * 0.8}px ${fontFamily}`;
  bctx.fillStyle = '#000';
  bctx.fillRect(0, 0, bigCanvas.width, bigCanvas.height);
  bctx.fillStyle = color;
  bctx.textBaseline = 'middle';
  bctx.fillText(text, 10, bigHeight / 2 + 4);

  const smallWidth = Math.max(1, Math.round(textWidth * (HEIGHT / bigHeight)));
  const small = document.getElementById('preview');
  small.width = smallWidth;
  small.height = HEIGHT;
  const sctx = small.getContext('2d');
  sctx.imageSmoothingEnabled = false;
  sctx.drawImage(bigCanvas, 0, 0, smallWidth, HEIGHT);

  // Pack into column-major RGB buffer, with WIDTH(20) blank columns appended
  // as a gap so repeats don't run into each other.
  const GAP = 20;
  const totalWidth = smallWidth + GAP;
  const imgData = sctx.getImageData(0, 0, smallWidth, HEIGHT).data;

  // Snap each pixel to either full text color or black. Font edges are
  // anti-aliased by the browser (soft, partial-brightness pixels), and
  // those are exactly what look like "ghosting" once scaled down to LED
  // resolution. THRESHOLD is the only tunable here: 0.0-1.0, lower =
  // more pixels count as "on" (bolder/thicker text), higher = stricter
  // (thinner, crisper text). Try nudging this value first if needed.
  const THRESHOLD = 0.35;
  const r0 = parseInt(color.slice(1, 3), 16);
  const g0 = parseInt(color.slice(3, 5), 16);
  const b0 = parseInt(color.slice(5, 7), 16);
  const fullMag = r0 + g0 + b0;

  const bytes = new Uint8Array(totalWidth * HEIGHT * 3);
  for (let col = 0; col < smallWidth; col++) {
    for (let row = 0; row < HEIGHT; row++) {
      const srcIdx = (row * smallWidth + col) * 4;
      const dstIdx = (col * HEIGHT + row) * 3;
      const mag = imgData[srcIdx] + imgData[srcIdx + 1] + imgData[srcIdx + 2];
      const coverage = fullMag > 0 ? (mag / fullMag) : 0;
      if (coverage > THRESHOLD) {
        bytes[dstIdx]     = r0;
        bytes[dstIdx + 1] = g0;
        bytes[dstIdx + 2] = b0;
      }
      // else leave as 0,0,0 (already zero-initialized)
    }
  }

  lastBitmap = { width: totalWidth, bytes: bytes };
  setStatus(`Preview ready — ${smallWidth}px wide text (+${GAP}px gap).`);
}

async function uploadMessage() {
  if (!lastBitmap) { setStatus('Preview a message first.'); return; }
  const speed = document.getElementById('speed').value || '60';
  const name = 'msg' + Date.now();
  setStatus('Uploading...');

  const form = new FormData();
  form.append('name', name);
  form.append('speed', speed);
  form.append('file', new Blob([lastBitmap.bytes]), 'bitmap.bin');

  try {
    const resp = await fetch('/upload', { method: 'POST', body: form });
    if (resp.ok) {
      setStatus('Sent to display');
      loadList();
    } else {
      setStatus('Upload failed.');
    }
  } catch (e) {
    setStatus('Upload error: ' + e);
  }
}

async function ctrl(action, value) {
  let url = `/control?action=${action}`;
  if (value !== undefined) url += `&value=${value}`;
  await fetch(url, { method: 'POST' });
  setStatus('Sent command: ' + action);
}

function setBrightness() {
  const v = document.getElementById('brightness').value;
  ctrl('setBrightness', v);
}

async function loadList() {
  const resp = await fetch('/list');
  const text = await resp.text();
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const el = document.getElementById('msgList');
  if (lines.length === 0) { el.innerHTML = '<i>No messages saved yet.</i>'; return; }
  el.innerHTML = '';
  lines.forEach(line => {
    const parts = line.split(',');
    const name = parts[0], width = parts[1], speed = parts[2];
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span>${name} (${width}px, ${speed}ms)</span>
      <button class="danger" onclick="deleteMsg('${name}')">Delete</button>`;
    el.appendChild(div);
  });
}

async function deleteMsg(name) {
  await fetch(`/delete?name=${name}`, { method: 'POST' });
  loadList();
}

window.onload = loadList;
</script>
</body>
</html>
