<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#c471ed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Rupee symbol -->
  <text x="256" y="360" font-size="280" font-family="Arial,sans-serif"
        font-weight="bold" text-anchor="middle" fill="white">₹</text>
  <!-- Small chart bars at bottom -->
  <rect x="80"  y="400" width="50" height="60" rx="8" fill="rgba(255,255,255,0.35)"/>
  <rect x="148" y="370" width="50" height="90" rx="8" fill="rgba(255,255,255,0.5)"/>
  <rect x="216" y="350" width="50" height="110" rx="8" fill="rgba(255,255,255,0.65)"/>
</svg>
